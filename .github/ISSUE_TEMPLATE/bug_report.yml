name: Bug Report
description: Report a bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        Please describe the bug clearly.
        
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How to reproduce the bug"
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What should happen"
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happens"
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: "Logs/Error Messages"
      description: "Any relevant logs or error messages"
    validations:
      required: false
